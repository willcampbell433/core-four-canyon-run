<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Ofishal Business, a Henriques 35 Express, running offshore at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06111e"/>
      <stop offset="0.55" stop-color="#0c2238"/>
      <stop offset="0.82" stop-color="#69402a"/>
      <stop offset="1" stop-color="#d97a3d"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123049"/>
      <stop offset="0.25" stop-color="#0b2137"/>
      <stop offset="1" stop-color="#050e18"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f1e7"/>
      <stop offset="0.7" stop-color="#dcd4c4"/>
      <stop offset="1" stop-color="#b9ae99"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb066" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffb066" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="800" height="330" fill="url(#sky)"/>
  <ellipse cx="560" cy="326" rx="230" ry="70" fill="url(#glow)"/>
  <circle cx="560" cy="322" r="26" fill="#ffc27d" opacity="0.95"/>
  <!-- distant clouds -->
  <g fill="#0e2740" opacity="0.75">
    <ellipse cx="150" cy="120" rx="90" ry="10"/>
    <ellipse cx="240" cy="150" rx="60" ry="7"/>
    <ellipse cx="650" cy="90" rx="80" ry="8"/>
  </g>
  <g fill="#8a5232" opacity="0.5">
    <ellipse cx="480" cy="285" rx="120" ry="6"/>
    <ellipse cx="640" cy="305" rx="90" ry="5"/>
  </g>

  <!-- sea -->
  <rect y="330" width="800" height="170" fill="url(#sea)"/>
  <rect y="328" width="800" height="4" fill="#e08b4a" opacity="0.55"/>
  <!-- sun path on water -->
  <g fill="#f2a05e">
    <rect x="500" y="342" width="120" height="3" rx="1.5" opacity="0.5"/>
    <rect x="520" y="356" width="90" height="3" rx="1.5" opacity="0.35"/>
    <rect x="540" y="372" width="60" height="3" rx="1.5" opacity="0.25"/>
  </g>
  <!-- swells -->
  <g fill="#1c3f5e" opacity="0.6">
    <rect x="40" y="390" width="180" height="4" rx="2"/>
    <rect x="300" y="420" width="220" height="4" rx="2"/>
    <rect x="600" y="400" width="160" height="4" rx="2"/>
    <rect x="90" y="450" width="240" height="4" rx="2"/>
    <rect x="470" y="460" width="200" height="4" rx="2"/>
  </g>

  <!-- wake -->
  <g fill="#dfe9f0">
    <path d="M470 384 Q580 378 750 402 L750 414 Q590 392 466 392 Z" opacity="0.5"/>
    <path d="M480 392 Q600 394 780 428 L780 438 Q610 406 476 398 Z" opacity="0.3"/>
    <ellipse cx="480" cy="388" rx="26" ry="7" opacity="0.7"/>
  </g>
  <!-- bow spray -->
  <g fill="#e8f1f7">
    <ellipse cx="182" cy="378" rx="20" ry="6" opacity="0.65"/>
    <ellipse cx="166" cy="372" rx="10" ry="4" opacity="0.5"/>
  </g>

  <!-- boat: Henriques 35 Express, bow to the left, slight running trim -->
  <g transform="rotate(-2 400 360)">
    <!-- outriggers -->
    <g stroke="#c9cdd2" stroke-width="3" stroke-linecap="round">
      <line x1="330" y1="292" x2="180" y2="150"/>
      <line x1="392" y1="292" x2="330" y2="120"/>
    </g>
    <g stroke="#7c8894" stroke-width="1.2">
      <line x1="180" y1="150" x2="300" y2="300"/>
      <line x1="330" y1="120" x2="398" y2="298"/>
    </g>
    <!-- antennas -->
    <line x1="416" y1="288" x2="428" y2="180" stroke="#c9cdd2" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="404" y1="288" x2="408" y2="200" stroke="#aab3bc" stroke-width="2" stroke-linecap="round"/>

    <!-- hardtop -->
    <path d="M312 292 L448 292 L440 278 L322 278 Z" fill="#e9e4d8"/>
    <g stroke="#b8b0a0" stroke-width="3">
      <line x1="328" y1="292" x2="330" y2="312"/>
      <line x1="434" y1="292" x2="432" y2="312"/>
    </g>

    <!-- express house / windshield -->
    <path d="M298 340 L306 312 L342 300 L446 300 L452 340 Z" fill="#efe9dc"/>
    <path d="M310 312 L344 303 L400 303 L398 316 L308 318 Z" fill="#0f2233"/>
    <path d="M402 303 L444 303 L446 316 L400 316 Z" fill="#122a3f"/>

    <!-- hull -->
    <path d="M160 348 Q170 342 200 338 L286 334 L300 340 L520 340 L516 388 Q380 400 300 396 Q230 392 196 380 Q170 370 160 348 Z" fill="url(#hull)"/>
    <!-- sheer stripe -->
    <path d="M172 350 Q210 342 288 338 L300 343 L518 343 L517.5 350 L298 350 Q220 352 178 358 Z" fill="#0f2740"/>
    <!-- spray rail -->
    <path d="M190 366 Q300 374 512 372 L511.6 376 Q300 380 186 372 Z" fill="#a89c86" opacity="0.8"/>
    <!-- bow flare highlight -->
    <path d="M162 348 Q176 342 204 338 L212 344 Q184 348 168 354 Z" fill="#fbf8f1" opacity="0.7"/>
    <!-- transom name -->
    <text x="452" y="366" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" font-weight="bold" fill="#0f2740" text-anchor="middle" letter-spacing="0.5">Ofishal</text>
    <text x="452" y="384" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" font-weight="bold" fill="#0f2740" text-anchor="middle" letter-spacing="0.5">Business</text>

    <!-- cockpit details -->
    <line x1="452" y1="340" x2="452" y2="300" stroke="#d8d0c0" stroke-width="0" />
    <g stroke="#9aa4ad" stroke-width="2" stroke-linecap="round">
      <line x1="460" y1="340" x2="500" y2="340"/>
    </g>
    <!-- rod holders / rods raked aft -->
    <g stroke="#d7dbde" stroke-width="2" stroke-linecap="round">
      <line x1="462" y1="338" x2="486" y2="286"/>
      <line x1="476" y1="338" x2="504" y2="292"/>
      <line x1="490" y1="338" x2="520" y2="300"/>
    </g>
    <!-- nav light -->
    <circle cx="300" cy="336" r="3" fill="#ff5d5d"/>
  </g>
</svg>
